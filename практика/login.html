<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Aqmola - Кіру жүйесі</title>
  <link rel="icon" type="image/png" href="png/Digetal_Aqmola.png">
  <link rel="stylesheet" href="css/login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-section-left">
      <div class="login-form-wrapper">
        <h1 class="login-title">Digital Aqmola</h1>
        <h2 class="login-subtitle">Жүйеге қосылыңыз</h2>
        <form action="dashboard.html">
          <div class="form-group">
            <input type="text" id="username" class="form-input" placeholder="Электрондық пошта" required>
          </div>
          <div class="form-group">
            <div class="password-input-wrapper">
              <input type="password" id="password" class="form-input" placeholder="Құпия сөз" required>
              <button type="button" class="btn-toggle-password" aria-label="Құпия сөзді көрсету">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit">
            Кіру
            <svg viewBox="0 0 24 24" class="icon-arrow" fill="white">
              <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
    <div class="login-section-right">
      <div class="illustration-wrapper">
        <img src="png/Digetal_Aqmola.png" alt="Digital Aqmola Illustration" class="login-illustration">
      </div>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
